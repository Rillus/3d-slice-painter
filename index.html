<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>3D Slice Painter</title>
  </head>
  <body>
    <div id="app">
      <canvas id="c" tabindex="0" aria-label="3D paint viewport"></canvas>
      <div class="hud-overlay" aria-hidden="false">
        <div class="hud-dock hud-dock--toolbar" id="hud-dock-toolbar" data-hud-dock="toolbar">
          <header class="hud-dock__body hud-brush hud-panel" id="hud-toolbar-body" aria-label="Brush and colour">
            <div class="hud-dock__menu-header hud-dock__menu-header--toolbar">
              <span class="hud-dock__menu-title">Brush</span>
              <button
                type="button"
                id="hud-toggle-toolbar"
                class="hud-dock__toggle hud__btn"
                aria-expanded="true"
                aria-controls="hud-toolbar-collapse"
              >
                <span class="hud-dock__glyph-collapse" aria-hidden="true">−</span>
                <span class="hud-dock__glyph-expand" aria-hidden="true">+</span>
              </button>
            </div>
            <div id="hud-toolbar-collapse" class="hud-dock__collapse-target">
          <div class="hud-brush__row">
            <button
              type="button"
              id="paint-undo"
              class="hud__btn hud__btn--compact"
              disabled
              title="Undo last stroke (⌘/Ctrl+Z)"
              aria-label="Undo last stroke"
            >
              Undo
            </button>
            <div class="hud-brush__colour" id="brush-colour-group" role="group" aria-label="Colour">
              <span class="hud-brush__name">Colour</span>
              <div class="hud-brush__colour-row">
                <button type="button" id="colour-transparent" class="hud__btn hud__btn--compact" title="Erase to transparent">
                  Clear
                </button>
                <label class="hud__colour-native" title="Spectrum">
                  <span class="visually-hidden">Spectrum</span>
                  <input id="colour-native" type="color" value="#c83730" />
                </label>
                <input
                  id="colour-hex"
                  class="hud__hex"
                  type="text"
                  spellcheck="false"
                  maxlength="9"
                  autocomplete="off"
                  aria-label="Colour hex (#RRGGBB or #RRGGBBAA)"
                  value="#c83730"
                />
              </div>
            </div>
            <label class="hud-brush__item">
              <span class="hud-brush__name">Size</span>
              <input id="brush-size" type="range" min="4" max="120" value="32" />
            </label>
            <label class="hud-brush__item">
              <span class="hud-brush__name">Opacity</span>
              <input id="brush-opacity" type="range" min="5" max="100" value="85" />
            </label>
            <label class="hud-brush__item">
              <span class="hud-brush__name">Hardness</span>
              <input id="brush-hardness" type="range" min="0" max="100" value="65" />
            </label>
          </div>
          <div id="colour-swatches" class="hud__swatches hud__swatches--toolbar" aria-label="Recent colours"></div>
            </div>
          </header>
        </div>

        <div class="hud-dock hud-dock--left" id="hud-dock-left" data-hud-dock="left">
        <aside class="hud-dock__body hud-left hud-panel" id="hud-left-body" aria-label="Tools">
          <div class="hud-dock__menu-header">
            <span class="hud-dock__menu-title">Tools</span>
            <button
              type="button"
              id="hud-toggle-left"
              class="hud-dock__toggle hud__btn"
              aria-expanded="true"
              aria-controls="hud-left-inner"
            >
              <span class="hud-dock__glyph-collapse" aria-hidden="true">−</span>
              <span class="hud-dock__glyph-expand" aria-hidden="true">+</span>
            </button>
          </div>
          <div id="hud-left-inner" class="hud-dock__collapse-target">
          <div class="hud__mode" role="group" aria-label="Interaction mode">
            <button type="button" id="mode-paint" class="hud__segment hud__segment--active" aria-pressed="true">
              Paint
            </button>
            <button type="button" id="mode-navigate" class="hud__segment" aria-pressed="false">Navigate</button>
          </div>
          <div class="hud__project-row">
            <button type="button" id="project-new" class="hud__btn">New project</button>
            <button type="button" id="project-export" class="hud__btn">Export</button>
          </div>
          </div>
        </aside>
        </div>

        <div class="hud-dock hud-dock--right" id="hud-dock-right" data-hud-dock="right">
        <aside class="hud-dock__body hud-right hud-panel" id="hud-right-body" aria-label="Slices and layers">
          <div class="hud-dock__menu-header">
            <span class="hud-dock__menu-title">Slices</span>
            <button
              type="button"
              id="hud-toggle-right"
              class="hud-dock__toggle hud__btn"
              aria-expanded="true"
              aria-controls="hud-right-inner"
            >
              <span class="hud-dock__glyph-collapse" aria-hidden="true">−</span>
              <span class="hud-dock__glyph-expand" aria-hidden="true">+</span>
            </button>
          </div>
          <div id="hud-right-inner" class="hud-dock__collapse-target">
          <div class="hud__row hud__row--slice-label">
            <span id="slice-active-label" aria-live="polite">Slice 1 / 1</span>
          </div>
          <div class="hud__slice-nav">
            <button type="button" id="slice-prev" class="hud__btn" aria-label="Previous slice" title="Previous slice ([)">
              Prev slice
            </button>
            <button type="button" id="slice-next" class="hud__btn" aria-label="Next slice" title="Next slice (])">
              Next slice
            </button>
          </div>
          <div class="hud__slice-nav">
            <button
              type="button"
              id="slice-nudge-back"
              class="hud__btn"
              aria-label="Move current slice back along stack (local −Z)"
              title="Along stack toward lower index (−)"
            >
              Stack −
            </button>
            <button
              type="button"
              id="slice-nudge-forward"
              class="hud__btn"
              aria-label="Move current slice forward along stack (local +Z)"
              title="Along stack toward higher index (+)"
            >
              Stack +
            </button>
          </div>
          <button type="button" id="slice-add" class="hud__btn hud__btn--block">Add slice</button>

          <span class="hud__label hud__label--sub">Active slice (plane)</span>
          <div class="hud__grid2">
            <label class="hud__mini hud__mini--slider">
              <span class="hud__mini-head">
                <span>Pos X</span>
                <output id="slice-plane-px-out" class="hud__mini-value" for="slice-plane-px">0</output>
              </span>
              <input
                id="slice-plane-px"
                type="range"
                min="-3"
                max="3"
                step="0.02"
                value="0"
                aria-label="Slice position local X"
              />
            </label>
            <label class="hud__mini hud__mini--slider">
              <span class="hud__mini-head">
                <span>Pos Y</span>
                <output id="slice-plane-py-out" class="hud__mini-value" for="slice-plane-py">0</output>
              </span>
              <input
                id="slice-plane-py"
                type="range"
                min="-3"
                max="3"
                step="0.02"
                value="0"
                aria-label="Slice position local Y"
              />
            </label>
            <label class="hud__mini hud__mini--slider">
              <span class="hud__mini-head">
                <span>Scale X</span>
                <output id="slice-plane-sx-out" class="hud__mini-value" for="slice-plane-sx">1</output>
              </span>
              <input
                id="slice-plane-sx"
                type="range"
                min="0.05"
                max="50"
                step="0.05"
                value="1"
                aria-label="Slice scale local X"
              />
            </label>
            <label class="hud__mini hud__mini--slider">
              <span class="hud__mini-head">
                <span>Scale Y</span>
                <output id="slice-plane-sy-out" class="hud__mini-value" for="slice-plane-sy">1</output>
              </span>
              <input
                id="slice-plane-sy"
                type="range"
                min="0.05"
                max="50"
                step="0.05"
                value="1"
                aria-label="Slice scale local Y"
              />
            </label>
          </div>

          <label class="hud__row hud__row--wrap">
            <span class="hud__row-label">Spacing (world)</span>
            <input
              id="slice-spacing"
              type="number"
              min="0.01"
              step="0.01"
              value="0.12"
              aria-label="Distance between adjacent slices in world units"
            />
          </label>
          <label class="hud__row hud__row--wrap">
            <span class="hud__row-label">Slice facing</span>
            <select id="slice-orient" class="hud__select" aria-label="Slice stack facing">
              <option value="pz" selected>+Z world</option>
              <option value="nz">−Z world</option>
              <option value="px">+X world</option>
              <option value="nx">−X world</option>
              <option value="py">+Y world</option>
              <option value="ny">−Y world</option>
              <option value="viewport_action">Match viewport…</option>
            </select>
          </label>
          <button type="button" id="slice-orient-viewport" class="hud__btn hud__btn--block">Match viewport</button>
          </div>
        </aside>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
